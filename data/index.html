<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP LCD 控制</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-align: center; padding: 20px; background: #111; color: #eee; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    button { font-size: 1.1rem; padding: 0.6rem 1.2rem; margin: 0.3rem; border-radius: 6px; border: none; cursor: pointer; }
    .prev { background: #444; color: #fff; }
    .next { background: #2979ff; color: #fff; }
    .idx-input { margin-top: 2rem; }
    .Photo_state_change { color: #eee; }
    .Photo_state_change.photo-flash { background: #555; }
    .Photo_state_change.photo-sd { background: #2e7d32; }
    .photo-ext { background: #1565c0; }
    input[type="number"] { width: 5rem; padding: 0.6rem; border-radius: 6px; border: 1px solid #555; background:#222; color:#eee; }
  </style>
</head>
<body>
  <h1>ESP LCD 图片控制</h1>
  <p>当前设备已连接，点击按钮切换图片。</p>
  <div>
    <button class="prev" onclick="send('/prev')">上一张</button>
    <button class="next" onclick="send('/next')">下一张</button>
  </div>
  <div style="margin-top:1.5rem;">
    <label for="status" style="margin-right:0.5rem;">状态选择：</label>
    <select id="status" onchange="changeStatus()" style="padding:0.4rem 0.6rem;border-radius:6px;border:1px solid #555;background:#222;color:#eee;">
      <option value="">手动模式（不自动切换）</option>
      <option value="idle">闲着　:D</option>
      <option value="eat">干饭　(　o=^•ェ•)o　┏━┓</option>
      <option value="sleep">睡觉　(～﹃～)~zZ</option>
      <option value="work">干活　/(ㄒoㄒ)/~~</option>
      <option value="play">玩　φ(゜▽゜*)♪</option>
    </select>
  </div>
  <p id="stateHint" style="font-size:0.9rem;opacity:0.85;">当前：手动模式（不自动随机）</p>
  <div style="margin-top:1.5rem;">
    <button id="photoSourceBtn" class="Photo_state_change photo-flash" onclick="togglePhotoSource()">图片源：板载Flash</button>
  </div>
  <div style="margin-top:1.5rem;">
    <button id="gifSourceBtn" class="Photo_state_change" onclick="toggleGifSource()" style="background:#5a3cb5;color:#fff;">GIF源：板载Flash</button>
  </div>
  <div style="margin-top:1rem;">
    <button id="gifSyncBtn" class="Photo_state_change" onclick="syncGifToExternalFlash()" style="background:#8d6e63;color:#fff;">同步gif_data到外部Flash</button>
  </div>
  <div style="margin-top:1rem;">
    <button id="playGifBtn" class="Photo_state_change" onclick="playGifNow()" style="background:#00695c;color:#fff;">播放 GIF</button>
  </div>
  <div class="idx-input">
    <input id="idx" type="number" min="0" step="1" placeholder="索引" />
    <button onclick="jump()">跳转</button>
  </div>
  <p style="font-size:0.9rem;opacity:0.8;">索引范围：0 ~ N-1（N 为图片数量）。</p>
  <script>
    function send(path) {
      fetch(path).catch(() => {});
    }

    function refreshGifStatus() {
      fetch('/gifstatus')
        .then(r => r.json())
        .then(status => {
          const srcBtn = document.getElementById('gifSourceBtn');
          const playBtn = document.getElementById('playGifBtn');
          if (srcBtn) {
            if (status.useExternal && status.extGifReady) {
              srcBtn.textContent = 'GIF源：外部Flash';
            } else if (!status.useExternal) {
              srcBtn.textContent = status.onboardReady ? 'GIF源：板载Flash' : 'GIF源：板载Flash（不可用）';
            } else {
              srcBtn.textContent = '外部Flash无GIF';
            }
          }
          if (playBtn) {
            playBtn.textContent = '播放 GIF';
          }
        })
        .catch(() => {});
    }

    function togglePhotoSource() {
      fetch('/photo')
        .then(r => r.text())
        .then(t => {
          const btn = document.getElementById('photoSourceBtn');
          if (!btn) return;
          const v = t.trim();
          if (v === 'SD' || v === 'SD_ONLY') {
            btn.textContent = '图片源：SD卡';
            btn.classList.remove('photo-flash');
            btn.classList.add('photo-sd');
          } else if (v === 'FLASH') {
            btn.textContent = '图片源：板载Flash';
            btn.classList.remove('photo-sd');
            btn.classList.add('photo-flash');
          } else if (v === 'NO_SD') {
            btn.textContent = '未检测到SD卡';
          }
        })
        .catch(() => {});
    }

    function toggleGifSource() {
      fetch('/gifsource')
        .then(r => r.text())
        .then(t => {
          const btn = document.getElementById('gifSourceBtn');
          if (!btn) return;
          const v = t.trim();
          if (v === 'EXT_FLASH') {
            btn.textContent = 'GIF源：外部Flash';
          } else if (v === 'ONBOARD_FLASH') {
            btn.textContent = 'GIF源：板载Flash';
          } else if (v === 'NO_EXT_GIF') {
            btn.textContent = '外部Flash无GIF，仍用板载';
          }
          refreshGifStatus();
        })
        .catch(() => {});
    }

    function syncGifToExternalFlash() {
      fetch('/gifsync')
        .then(r => r.text())
        .then(t => {
          const btn = document.getElementById('gifSyncBtn');
          const srcBtn = document.getElementById('gifSourceBtn');
          if (!btn) return;
          const v = t.trim();
          if (v === 'SYNC_OK_EXT') {
            btn.textContent = '同步成功';
            if (srcBtn) srcBtn.textContent = 'GIF源：外部Flash';
          } else if (v === 'SYNC_OK_BUT_NOT_READY') {
            btn.textContent = '同步完成但未就绪';
          } else if (v === 'NO_EXT_FLASH') {
            btn.textContent = '未检测到外部Flash';
          } else {
            btn.textContent = '同步失败';
          }
          refreshGifStatus();
          setTimeout(() => {
            btn.textContent = '同步gif_data到外部Flash';
          }, 1500);
        })
        .catch(() => {});
    }

    function playGifNow() {
      fetch('/gif')
        .then(r => r.text())
        .then(t => {
          const srcBtn = document.getElementById('gifSourceBtn');
          const playBtn = document.getElementById('playGifBtn');
          const v = t.trim();
          if (srcBtn && v === 'FALLBACK_EXT') {
            srcBtn.textContent = 'GIF源：外部Flash（自动回退）';
          }
          if (playBtn) {
            if (v === 'NO_EXT_GIF') {
              playBtn.textContent = '外部Flash无GIF';
            } else if (v === 'NO_ONBOARD_GIF') {
              playBtn.textContent = '没有可播放的GIF';
            } else {
              playBtn.textContent = '播放 GIF';
            }
          }
          refreshGifStatus();
        })
        .catch(() => {});
    }
    function jump() {
      const v = document.getElementById('idx').value;// 索引不能为空
      if (v === '') return;// 索引不能为空
      fetch('/set?i=' + encodeURIComponent(v)).catch(() => {});// 发送跳转请求
    }
    function changeStatus() {
      const s = document.getElementById('status').value;
      const hint = document.getElementById('stateHint');

      if (s === '') {
        fetch('/state?name=off')
          .then(() => {
            if (hint) hint.textContent = '当前：手动模式（不自动随机）';
          })
          .catch(() => {});
        return;
      }

      fetch('/state?name=' + encodeURIComponent(s))
        .then(r => r.text())
        .then(t => {
          if (!hint) return;
          hint.textContent = '当前：' + t.trim() + ' 组（设备端每 5 秒随机切换）';
        })
        .catch(() => {});
    }

    refreshGifStatus();
  </script>
</body>
</html>
